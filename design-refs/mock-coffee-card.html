<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUPPING — Coffee Card Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F5EDE0;
  --linen: #EDE4D4;
  --parchment: #DDD0BD;
  --espresso: #2A1F17;
  --espresso-light: #4A3B2E;
  --copper-300: #C9A57A;
  --copper-400: #B8875A;
  --copper-500: #A8693A;
  --roast-medium: #9A6B3A;
  --roast-dark: #3E2820;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Outfit', system-ui, sans-serif;
  background: var(--cream);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 56px 40px;
}
.label {
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--copper-400);
  margin-bottom: 28px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(3, 272px);
  gap: 20px;
}
/* ── Card base ── */
.card {
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 1px 3px rgba(42,31,23,.07), 0 0 0 1px rgba(42,31,23,.04);
  transition: transform .18s ease, box-shadow .18s ease;
}
.card--hover {
  transform: translateY(-5px);
  box-shadow: 0 14px 36px rgba(42,31,23,.14), 0 0 0 1px rgba(42,31,23,.05);
}
/* ── Photo ── */
.photo {
  position: relative;
  aspect-ratio: 4/3;
  overflow: hidden;
}
.photo-img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform .3s ease;
}
/* Gradient photo stand-ins */
.photo-espresso {
  background: linear-gradient(160deg,#1a0f08 0%,#3D2010 35%,#6B3A1C 60%,#4A2510 100%);
}
.photo-latte {
  background: linear-gradient(145deg,#c8a882 0%,#9a6b3a 30%,#d4b896 60%,#f0ddc4 90%);
}
.photo-fallback {
  background: linear-gradient(135deg, var(--linen) 0%, var(--parchment) 55%, var(--cream) 100%);
  display: flex; align-items: center; justify-content: center;
}
/* Photo overlay bottom gradient for badges */
.photo::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 56px;
  background: linear-gradient(to top, rgba(0,0,0,.35) 0%, transparent 100%);
  pointer-events: none;
}
.photo-fallback::after { display: none; }

/* Roast badge */
.roast {
  position: absolute;
  bottom: 9px; left: 10px;
  padding: 3px 9px;
  border-radius: 6px;
  font-size: 10.5px;
  font-weight: 500;
  color: #fff;
  letter-spacing: .03em;
  z-index: 2;
  backdrop-filter: blur(2px);
}
.roast-medium { background: var(--roast-medium); }
.roast-dark   { background: var(--roast-dark); }

/* Edit/delete always visible */
.actions {
  position: absolute;
  bottom: 8px; right: 8px;
  display: flex; gap: 4px;
  z-index: 2;
}
.action-btn {
  width: 27px; height: 27px;
  border-radius: 8px;
  background: rgba(15,8,4,.5);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  border: none; cursor: pointer;
}
.action-btn svg { width:12px; height:12px; stroke:#fff; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }

/* No-photo fallback icon */
.fallback-cup {
  opacity: .15;
}
.fallback-cup svg { width:52px; height:52px; fill: var(--espresso); }

/* ── Card body ── */
.body { padding: 13px 15px 15px; }

.overline {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .09em;
  text-transform: uppercase;
  color: var(--copper-400);
  margin-bottom: 4px;
}
.name {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: 21px;
  font-weight: 400;
  color: var(--espresso);
  line-height: 1.18;
  margin-bottom: 9px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
/* Rating cups row */
.rating { display: flex; align-items: center; gap: 9px; margin-bottom: 11px; }
.cups { display: flex; gap: 3px; }
.cup { width:17px; height:17px; }
.cup svg { width:100%; height:100%; }
.rating-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  color: var(--espresso-light);
  margin-top: 1px;
}
/* Tags */
.tags { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
.tag {
  padding: 3px 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 500;
}
.tag-fruity    { background: rgba(200,87,78,.11); color: #8B3730; }
.tag-citrus    { background: rgba(212,160,48,.13); color: #7A5A10; }
.tag-chocolate { background: rgba(123,91,58,.11);  color: #4F3219; }
.tag-nutty     { background: rgba(154,125,94,.13); color: #5A4530; }
.tag-floral    { background: rgba(184,122,150,.11); color: #6B3555; }
.tag-more      { background: var(--linen); color: var(--espresso-light); }

/* ── Bottom label row ── */
.note {
  margin-top: 32px;
  display: flex;
  gap: 32px;
  align-items: center;
  font-size: 10.5px;
  color: var(--copper-400);
  letter-spacing: .05em;
}
.note-item { display: flex; align-items: center; gap: 6px; }
.note-dot { width:8px; height:8px; border-radius:50%; }
.dot-default { background: #fff; border: 1.5px solid var(--parchment); }
.dot-hover   { background: #fff; border: 1.5px solid var(--copper-400); box-shadow: 0 3px 8px rgba(42,31,23,.12); }
.dot-fallback { background: var(--linen); border: 1.5px solid var(--parchment); }
</style>
</head>
<body>
  <p class="label">Coffee Card — Redesign Reference · CUPPING</p>

  <div class="grid">

    <!-- ── Card 1: Espresso with photo ── -->
    <div class="card">
      <div class="photo photo-espresso">
        <div class="roast roast-medium">Medium</div>
        <div class="actions">
          <button class="action-btn" aria-label="Editar">
            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="action-btn" aria-label="Eliminar">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>
      <div class="body">
        <div class="overline">Stumptown · Bean</div>
        <div class="name">Ethiopia Yirgacheffe</div>
        <div class="rating">
          <div class="cups">
            <!-- 4 filled + 1 half -->
            <div class="cup"><svg viewBox="0 0 20 20" fill="#A8693A"><path d="M4 3h12a1 1 0 0 1 1 1v1a6 6 0 0 1-6 6 6 6 0 0 1-6-6V4a1 1 0 0 1 1-1z"/><path d="M7 15h6l1 3H6l1-3z"/><rect x="5" y="13" width="10" height="2.5" rx="1.25"/></svg></div>
            <div class="cup"><svg viewBox="0 0 20 20" fill="#A8693A"><path d="M4 3h12a1 1 0 0 1 1 1v1a6 6 0 0 1-6 6 6 6 0 0 1-6-6V4a1 1 0 0 1 1-1z"/><path d="M7 15h6l1 3H6l1-3z"/><rect x="5" y="13" width="10" height="2.5" rx="1.25"/></svg></div>
            <div class="cup"><svg viewBox="0 0 20 20" fill="#A8693A"><path d="M4 3h12a1 1 0 0 1 1 1v1a6 6 0 0 1-6 6 6 6 0 0 1-6-6V4a1 1 0 0 1 1-1z"/><path d="M7 15h6l1 3H6l1-3z"/><rect x="5" y="13" width="10" height="2.5" rx="1.25"/></svg></div>
            <div class="cup"><svg viewBox="0 0 20 20" fill="#A8693A"><path d="M4 3h12a1 1 0 0 1 1 1v1a6 6 0 0 1-6 6 6 6 0 0 1-6-6V4a1 1 0 0 1 1-1z"/><path d="M7 15h6l1 3H6l1-3z"/><rect x="5" y="13" width="10" height="2.5" rx="1.25"/></svg></div>
            <!-- half cup -->
            <div class="cup">
              <svg viewBox="0 0 20 20">
                <defs><clipPath id="c1"><rect x="0" y="0" width="10" height="20"/></clipPath></defs>
                <path d="M4 3h12a1 1 0 0 1 1 1v1a6 6 0 0 1-6 6 6 6 0 0 1-6-6V4a1 1 0 0 1 1-1z" fill="#DDD0BD"/>
                <path d="M7 15h6l1 3H6l1-3z" fill="#DDD0BD"/>
                <rect x="5" y="13" width="10" height="2.5" rx="1.25" fill="#DDD0BD"/>
                <path d="M4 3h12a1 1 0 0 1 1 1v1a6 6 0 0 1-6 6 6 6 0 0 1-6-6V4a1 1 0 0 1 1-1z" fill="#A8693A" clip-path="url(#c1)"/>
                <path d="M7 15h6l1 3H6l1-3z" fill="#A8693A" clip-path="url(#c1)"/>
                <rect x="5" y="13" width="10" height="2.5" rx="1.25" fill="#A8693A" clip-path="url(#c1)"/>
              </svg>
            </div>
          </div>
          <span class="rating-val">4.5</span>
        </div>
        <div class="tags">
          <span class="tag tag-fruity">Frutal</span>
          <span class="tag tag-citrus">Cítrico</span>
        </div>
      </div>
    </div>

    <!-- ── Card 2: Latte, hover state ── -->
    <div class="card card--hover">
      <div class="photo photo-latte">
        <div class="roast roast-dark">Dark</div>
        <div class="actions">
          <button class="action-btn" aria-label="Editar">
            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="action-btn" aria-label="Eliminar">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>
      <div class="body">
        <div class="overline">Lavazza · Cápsula</div>
        <div class="name">Tierra! Amazonia</div>
        <div class="rating">
          <div class="cups">
            <div class="cup"><svg viewBox="0 0 20 20" fill="#A8693A"><path d="M4 3h12a1 1 0 0 1 1 1v1a6 6 0 0 1-6 6 6 6 0 0 1-6-6V4a1 1 0 0 1 1-1z"/><path d="M7 15h6l1 3H6l1-3z"/><rect x="5" y="13" width="10" height="2.5" rx="1.25"/></svg></div>
            <div class="cup"><svg viewBox="0 0 20 20" fill="#A8693A"><path d="M4 3h12a1 1 0 0 1 1 1v1a6 6 0 0 1-6 6 6 6 0 0 1-6-6V4a1 1 0 0 1 1-1z"/><path d="M7 15h6l1 3H6l1-3z"/><rect x="5" y="13" width="10" height="2.5" rx="1.25"/></svg></div>
            <div class="cup"><svg viewBox="0 0 20 20" fill="#A8693A"><path d="M4 3h12a1 1 0 0 1 1 1v1a6 6 0 0 1-6 6 6 6 0 0 1-6-6V4a1 1 0 0 1 1-1z"/><path d="M7 15h6l1 3H6l1-3z"/><rect x="5" y="13" width="10" height="2.5" rx="1.25"/></svg></div>
            <!-- half -->
            <div class="cup">
              <svg viewBox="0 0 20 20">
                <defs><clipPath id="c2"><rect x="0" y="0" width="10" height="20"/></clipPath></defs>
                <path d="M4 3h12a1 1 0 0 1 1 1v1a6 6 0 0 1-6 6 6 6 0 0 1-6-6V4a1 1 0 0 1 1-1z" fill="#DDD0BD"/>
                <path d="M7 15h6l1 3H6l1-3z" fill="#DDD0BD"/>
                <rect x="5" y="13" width="10" height="2.5" rx="1.25" fill="#DDD0BD"/>
                <path d="M4 3h12a1 1 0 0 1 1 1v1a6 6 0 0 1-6 6 6 6 0 0 1-6-6V4a1 1 0 0 1 1-1z" fill="#A8693A" clip-path="url(#c2)"/>
                <path d="M7 15h6l1 3H6l1-3z" fill="#A8693A" clip-path="url(#c2)"/>
                <rect x="5" y="13" width="10" height="2.5" rx="1.25" fill="#A8693A" clip-path="url(#c2)"/>
              </svg>
            </div>
            <div class="cup"><svg viewBox="0 0 20 20" fill="#DDD0BD"><path d="M4 3h12a1 1 0 0 1 1 1v1a6 6 0 0 1-6 6 6 6 0 0 1-6-6V4a1 1 0 0 1 1-1z"/><path d="M7 15h6l1 3H6l1-3z"/><rect x="5" y="13" width="10" height="2.5" rx="1.25"/></svg></div>
          </div>
          <span class="rating-val">3.5</span>
        </div>
        <div class="tags">
          <span class="tag tag-chocolate">Chocolate</span>
          <span class="tag tag-nutty">Nuez</span>
          <span class="tag tag-more">+1</span>
        </div>
      </div>
    </div>

    <!-- ── Card 3: No photo fallback ── -->
    <div class="card">
      <div class="photo photo-fallback">
        <div class="fallback-cup">
          <svg viewBox="0 0 52 52" fill="none">
            <path d="M8 10h36a2 2 0 0 1 2 2v5a16 16 0 0 1-16 16 16 16 0 0 1-16-16v-5a2 2 0 0 1 2-2z" fill="#2A1F17"/>
            <path d="M20 40h12l3 8H17l3-8z" fill="#2A1F17"/>
            <rect x="16" y="37" width="20" height="5" rx="2.5" fill="#2A1F17"/>
          </svg>
        </div>
      </div>
      <div class="body">
        <div class="overline">Nespresso · Cápsula</div>
        <div class="name">Arpeggio Decaffeinato</div>
        <div class="rating">
          <div class="cups">
            <div class="cup"><svg viewBox="0 0 20 20" fill="#A8693A"><path d="M4 3h12a1 1 0 0 1 1 1v1a6 6 0 0 1-6 6 6 6 0 0 1-6-6V4a1 1 0 0 1 1-1z"/><path d="M7 15h6l1 3H6l1-3z"/><rect x="5" y="13" width="10" height="2.5" rx="1.25"/></svg></div>
            <div class="cup"><svg viewBox="0 0 20 20" fill="#A8693A"><path d="M4 3h12a1 1 0 0 1 1 1v1a6 6 0 0 1-6 6 6 6 0 0 1-6-6V4a1 1 0 0 1 1-1z"/><path d="M7 15h6l1 3H6l1-3z"/><rect x="5" y="13" width="10" height="2.5" rx="1.25"/></svg></div>
            <div class="cup"><svg viewBox="0 0 20 20" fill="#A8693A"><path d="M4 3h12a1 1 0 0 1 1 1v1a6 6 0 0 1-6 6 6 6 0 0 1-6-6V4a1 1 0 0 1 1-1z"/><path d="M7 15h6l1 3H6l1-3z"/><rect x="5" y="13" width="10" height="2.5" rx="1.25"/></svg></div>
            <div class="cup"><svg viewBox="0 0 20 20" fill="#A8693A"><path d="M4 3h12a1 1 0 0 1 1 1v1a6 6 0 0 1-6 6 6 6 0 0 1-6-6V4a1 1 0 0 1 1-1z"/><path d="M7 15h6l1 3H6l1-3z"/><rect x="5" y="13" width="10" height="2.5" rx="1.25"/></svg></div>
            <div class="cup"><svg viewBox="0 0 20 20" fill="#DDD0BD"><path d="M4 3h12a1 1 0 0 1 1 1v1a6 6 0 0 1-6 6 6 6 0 0 1-6-6V4a1 1 0 0 1 1-1z"/><path d="M7 15h6l1 3H6l1-3z"/><rect x="5" y="13" width="10" height="2.5" rx="1.25"/></svg></div>
          </div>
          <span class="rating-val">4.0</span>
        </div>
        <div class="tags">

        </div>

    </div>

  </div>

  <div class="note">
    <div class="note-item"><div class="note-dot dot-default"></div> Estado normal</div>
    <div class="note-item"><div class="note-dot dot-hover"></div> Hover (card central)</div>
    <div class="note-item"><div class="note-dot dot-fallback"></div> Sin foto</div>
  </div>
</body>
